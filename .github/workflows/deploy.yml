name: Deploy Rauni.ai to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Inject secrets into rauni.html
        run: |
          sed -i "s|__EMAILJS_PUBLIC_KEY__|${{ secrets.EMAILJS_PUBLIC_KEY }}|g" rauni.html
          sed -i "s|__EMAILJS_SERVICE_ID__|${{ secrets.EMAILJS_SERVICE_ID }}|g" rauni.html
          sed -i "s|__TEMPLATE_TO_USER__|${{ secrets.EMAILJS_TEMPLATE_USER }}|g" rauni.html
          sed -i "s|__TEMPLATE_TO_COMPANY__|${{ secrets.EMAILJS_TEMPLATE_ADMIN }}|g" rauni.html

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
