<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rauni.ai</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Space+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:#0d1b2a}
body{font-family:'Outfit',sans-serif;color:#e8f4f8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px 14px;position:relative;overflow-x:hidden}
.grid{position:fixed;inset:0;background-image:linear-gradient(rgba(95,196,196,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(95,196,196,.04) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:0}
.orb{position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;animation:fl 12s ease-in-out infinite}
.o1{width:350px;height:350px;background:radial-gradient(circle,rgba(58,158,165,.4),transparent);top:-100px;left:-100px}
.o2{width:280px;height:280px;background:radial-gradient(circle,rgba(30,107,128,.45),transparent);bottom:-80px;right:-80px;animation-delay:-5s}
.o3{width:200px;height:200px;background:radial-gradient(circle,rgba(95,196,196,.3),transparent);top:40%;left:70%;animation-delay:-9s}
@keyframes fl{0%,100%{transform:translate(0,0) scale(1)}40%{transform:translate(22px,-28px) scale(1.06)}70%{transform:translate(-16px,16px) scale(.95)}}
#root{position:relative;z-index:1;width:100%;max-width:430px}
.card{background:linear-gradient(160deg,rgba(255,255,255,.06),rgba(255,255,255,.02));border:1px solid rgba(95,196,196,.18);border-radius:28px;padding:38px 28px 34px;backdrop-filter:blur(20px);box-shadow:0 0 50px rgba(95,196,196,.18),0 30px 80px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.07);display:flex;flex-direction:column;align-items:center}
.logo-ring{width:96px;height:96px;border-radius:50%;background:linear-gradient(145deg,rgba(95,196,196,.15),rgba(30,107,128,.1));border:1.5px solid rgba(95,196,196,.3);display:flex;align-items:center;justify-content:center;margin-bottom:18px;box-shadow:0 0 0 8px rgba(95,196,196,.05),0 8px 30px rgba(0,0,0,.3);animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(95,196,196,.3),0 8px 30px rgba(0,0,0,.3)}50%{box-shadow:0 0 0 9px rgba(95,196,196,.06),0 8px 30px rgba(0,0,0,.3)}}
.logo-ring img{width:64px;height:64px;object-fit:contain;filter:drop-shadow(0 3px 14px rgba(95,196,196,.5))}
h1{font-weight:900;font-size:2.3rem;letter-spacing:-.03em;background:linear-gradient(135deg,#fff,#5fc4c4 50%,#3a9ea5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:7px}
.tag{font-size:.97rem;color:rgba(200,235,240,.72);text-align:center;margin-bottom:5px}
.div{width:56px;height:2px;background:linear-gradient(90deg,transparent,#5fc4c4,transparent);border-radius:2px;margin:18px 0;opacity:.55}
.lbl{font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:.24em;text-transform:uppercase;color:#5fc4c4;opacity:.75;margin-bottom:18px}
.links{display:flex;flex-direction:column;gap:11px;width:100%;margin-bottom:28px}
.btn{display:flex;align-items:center;gap:13px;padding:13px 18px;border-radius:13px;background:rgba(255,255,255,.04);border:1px solid rgba(95,196,196,.11);color:#e8f4f8;cursor:pointer;transition:all .22s ease;user-select:none;-webkit-tap-highlight-color:transparent}
.btn:hover,.btn:focus{border-color:rgba(95,196,196,.4);background:rgba(95,196,196,.09);transform:translateY(-2px) scale(1.01);box-shadow:0 8px 22px rgba(95,196,196,.15);outline:none}
.btn:active{transform:scale(.97)}
.ico{width:37px;height:37px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ico svg{width:19px;height:19px}
.lt{display:flex;flex-direction:column}
.ln{font-weight:600;font-size:.88rem;line-height:1.2}
.ls{font-size:.73rem;color:rgba(200,235,240,.48)}
.arr{margin-left:auto;opacity:.38;transition:transform .22s,opacity .22s;font-size:.9rem}
.btn:hover .arr,.btn:focus .arr{transform:translateX(4px);opacity:.75}






.foot{margin-top:18px;font-size:.68rem;color:rgba(200,235,240,.22);letter-spacing:.08em;text-align:center}
</style>
</head>

// ---- Build DOM -------------------------------------------------------------
function build(){
  var root=document.getElementById('root');
  var card=document.createElement('div');card.className='card';

  var ring=document.createElement('div');ring.className='logo-ring';
  var img=new Image();img.src=LOGO;img.alt='Rauni.ai';
  ring.appendChild(img);card.appendChild(ring);

  var h1=document.createElement('h1');h1.textContent='Rauni.ai';card.appendChild(h1);
  var tag=document.createElement('p');tag.className='tag';tag.textContent='Welcome to Rauni world \uD83C\uDF0E';card.appendChild(tag);
  var dv=document.createElement('div');dv.className='div';card.appendChild(dv);
  var lbl=document.createElement('div');lbl.className='lbl';lbl.textContent='\u2736 Join Us \u2736';card.appendChild(lbl);

  var links=document.createElement('div');links.className='links';
  LINKS.forEach(function(link,i){
    var btn=document.createElement('div');btn.className='btn';btn.setAttribute('tabindex','0');btn.setAttribute('role','button');
    var ico=document.createElement('div');ico.className='ico';ico.style.background=BG[ICON_KEYS[i]];ico.innerHTML=SVGS[ICON_KEYS[i]];
    var lt=document.createElement('div');lt.className='lt';
    var ln=document.createElement('span');ln.className='ln';ln.textContent=link.n;
    var ls=document.createElement('span');ls.className='ls';ls.textContent=link.s;
    lt.appendChild(ln);lt.appendChild(ls);
    var arr=document.createElement('span');arr.className='arr';arr.textContent='\u2192';
    btn.appendChild(ico);btn.appendChild(lt);btn.appendChild(arr);
    btn.addEventListener('click',function(){
      if(link.email){
        var a=document.createElement('a');a.href=['ma','il','to:',E[0],'@',E[1]].join('');document.body.appendChild(a);a.click();document.body.removeChild(a);
      } else {
        window.open(link.u,'_blank','noopener,noreferrer');
      }
    });
    btn.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' ')btn.click();});
    links.appendChild(btn);
  });
  card.appendChild(links);


  root.appendChild(card);

  var foot=document.createElement('p');foot.className='foot';foot.innerHTML='\u00A9 2025 Rauni.ai \u00B7 All rights reserved';
  root.appendChild(foot);
}
document.addEventListener('DOMContentLoaded',build);
</script>
