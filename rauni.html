<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rauni.ai — Coming Soon</title>
  <meta name="description" content="Rauni.ai is coming soon. Something amazing is on its way."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #06060f;
      --surface: #0d0d1f;
      --accent: #7c5cfc;
      --accent2: #c084fc;
      --accent3: #38bdf8;
      --text: #f0eeff;
      --muted: #6b7280;
      --border: rgba(124,92,252,0.2);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    /* ── Canvas background ── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Noise overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.35;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Glow blobs ── */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 { width: 500px; height: 500px; background: rgba(124,92,252,0.18); top: -120px; left: -100px; animation: drift1 18s ease-in-out infinite; }
    .blob-2 { width: 400px; height: 400px; background: rgba(56,189,248,0.12); bottom: -80px; right: -80px; animation: drift2 22s ease-in-out infinite; }
    .blob-3 { width: 300px; height: 300px; background: rgba(192,132,252,0.1); top: 50%; left: 55%; animation: drift3 15s ease-in-out infinite; }

    @keyframes drift1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(60px,40px)} }
    @keyframes drift2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-50px,-30px)} }
    @keyframes drift3 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,-50px)} }

    /* ── Main layout ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    /* ── Logo area ── */
    .logo-wrap {
      position: relative;
      margin-bottom: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-ring-outer {
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 1px dashed rgba(124,92,252,0.35);
      animation: spin-slow 20s linear infinite;
    }
    .logo-ring-outer::after {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
      background: var(--accent2);
      border-radius: 50%;
      top: -5px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 12px var(--accent2);
    }

    .logo-ring-inner {
      position: absolute;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 1px dashed rgba(56,189,248,0.25);
      animation: spin-slow 14s linear infinite reverse;
    }

    .logo-core {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1a1040, #2d1b6b);
      border: 1.5px solid rgba(124,92,252,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      position: relative;
      z-index: 2;
      box-shadow: 0 0 30px rgba(124,92,252,0.3), inset 0 0 20px rgba(124,92,252,0.1);
    }

    @keyframes spin-slow { to { transform: rotate(360deg); } }

    /* ── Headline ── */
    .brand {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(48px, 10vw, 80px);
      letter-spacing: -3px;
      line-height: 1;
      background: linear-gradient(135deg, #fff 0%, #c4b5fd 40%, #7c5cfc 80%, #38bdf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
      text-align: center;
      animation: fadeup 0.8s ease both;
    }

    .tagline {
      font-size: 16px;
      color: #94a3b8;
      text-align: center;
      margin-bottom: 32px;
      font-weight: 300;
      letter-spacing: 0.5px;
      animation: fadeup 0.8s 0.1s ease both;
    }

    /* ── Status badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(124,92,252,0.1);
      border: 1px solid rgba(124,92,252,0.3);
      border-radius: 100px;
      padding: 8px 20px;
      margin-bottom: 40px;
      animation: fadeup 0.8s 0.2s ease both;
    }
    .badge-pulse {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #a78bfa;
      animation: pulse 2s ease-in-out infinite;
    }
    .badge span {
      font-size: 13px;
      color: #c4b5fd;
      font-weight: 500;
      letter-spacing: 0.5px;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(167,139,250,0.5); }
      50% { box-shadow: 0 0 0 6px rgba(167,139,250,0); }
    }

    /* ── Countdown ── */
    .countdown {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 48px;
      animation: fadeup 0.8s 0.3s ease both;
    }
    .cd-block {
      text-align: center;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 20px;
      min-width: 72px;
      backdrop-filter: blur(10px);
    }
    .cd-num {
      font-family: 'Syne', sans-serif;
      font-size: 36px;
      font-weight: 700;
      color: #e2e8f0;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      display: block;
    }
    .cd-lbl {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-top: 6px;
      display: block;
    }
    .cd-sep {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      color: #2d2d4e;
      margin-bottom: 16px;
    }

    /* ── Notify form ── */
    .notify-wrap {
      display: flex;
      gap: 0;
      max-width: 380px;
      width: 100%;
      margin-bottom: 48px;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(10px);
      animation: fadeup 0.8s 0.4s ease both;
      transition: border-color 0.3s;
    }
    .notify-wrap:focus-within {
      border-color: rgba(124,92,252,0.6);
      box-shadow: 0 0 0 3px rgba(124,92,252,0.1);
    }
    .notify-wrap input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 14px 18px;
      font-size: 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
    }
    .notify-wrap input::placeholder { color: #475569; }
    .notify-wrap button {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border: none;
      padding: 14px 22px;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .notify-wrap button:hover { opacity: 0.85; }

    /* ── Social links ── */
    .socials {
      display: flex;
      gap: 12px;
      margin-bottom: 48px;
      animation: fadeup 0.8s 0.5s ease both;
    }
    .soc-btn {
      width: 44px; height: 44px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.03);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      color: #6b7280;
      text-decoration: none;
    }
    .soc-btn:hover {
      border-color: rgba(124,92,252,0.5);
      background: rgba(124,92,252,0.1);
      color: #c4b5fd;
      transform: translateY(-2px);
    }
    .soc-btn svg { width: 18px; height: 18px; }

    /* ── Footer ── */
    .foot {
      font-size: 12px;
      color: #1e293b;
      animation: fadeup 0.8s 0.6s ease both;
    }

    /* ── Shared animation ── */
    @keyframes fadeup {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .cd-block { min-width: 58px; padding: 12px 14px; }
      .cd-num { font-size: 28px; }
      .countdown { gap: 8px; }
      .cd-sep { font-size: 22px; }
      .notify-wrap { max-width: 100%; }
    }
  </style>
</head>
<body>

  <script>
    /* ── Stars ── */
    (function () {
      var canvas = document.getElementById('bg-canvas');
      var ctx = canvas.getContext('2d');
      var stars = [];

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      function initStars() {
        stars = [];
        for (var i = 0; i < 160; i++) {
          stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 1.4 + 0.2,
            alpha: Math.random(),
            speed: Math.random() * 0.006 + 0.002,
            dir: Math.random() > 0.5 ? 1 : -1
          });
        }
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(function (s) {
          s.alpha += s.speed * s.dir;
          if (s.alpha >= 1 || s.alpha <= 0) s.dir *= -1;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(255,255,255,' + s.alpha.toFixed(2) + ')';
          ctx.fill();
        });
        requestAnimationFrame(draw);
      }

      resize();
      initStars();
      draw();
      window.addEventListener('resize', function () { resize(); initStars(); });
    })();

    /* ── Countdown ── */
    (function () {
      var launch = new Date('2025-08-01T00:00:00');
      function tick() {
        var diff = Math.max(0, launch - new Date());
        var dd = Math.floor(diff / 864e5);
        var hh = Math.floor((diff % 864e5) / 36e5);
        var mm = Math.floor((diff % 36e5) / 6e4);
        var ss = Math.floor((diff % 6e4) / 1e3);
        document.getElementById('days').textContent = String(dd).padStart(2, '0');
        document.getElementById('hrs').textContent  = String(hh).padStart(2, '0');
        document.getElementById('mins').textContent = String(mm).padStart(2, '0');
        document.getElementById('secs').textContent = String(ss).padStart(2, '0');
      }
      tick();
      setInterval(tick, 1000);
    })();

    /* ── Notify ── */
    function handleNotify() {
      var input = document.getElementById('emailIn');
      var btn = document.querySelector('.notify-wrap button');
      if (!input.value || !input.value.includes('@')) {
        input.style.outline = '2px solid #ef4444';
        setTimeout(function () { input.style.outline = ''; }, 1500);
        return;
      }
      input.value = '';
      btn.textContent = '✓ You\'re on the list!';
      btn.style.background = 'linear-gradient(135deg,#059669,#0d9488)';
      setTimeout(function () {
        btn.textContent = 'Notify Me';
        btn.style.background = '';
      }, 4000);
    }
  </script>
